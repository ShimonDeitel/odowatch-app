name: Odometer Fraud Watch
options:
  bundleIdPrefix: com.shimondeitel.odowatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Odometer Fraud Watch:
    type: application
    platform: iOS
    sources:
      - path: Odometer Fraud Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.odowatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Odometer Fraud Watch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Odometer Fraud WatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Odometer Fraud WatchTests
      - path: Odometer Fraud Watch.storekit
    dependencies:
      - target: Odometer Fraud Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.odowatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Odometer Fraud WatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Odometer Fraud WatchUITests
    dependencies:
      - target: Odometer Fraud Watch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.odowatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Odometer Fraud Watch:
    build:
      targets:
        Odometer Fraud Watch: all
        Odometer Fraud WatchTests: [test]
        Odometer Fraud WatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Odometer Fraud Watch.storekit
    test:
      config: Debug
      storeKitConfiguration: Odometer Fraud Watch.storekit
      targets:
        - Odometer Fraud WatchTests
        - Odometer Fraud WatchUITests
    archive:
      config: Release
